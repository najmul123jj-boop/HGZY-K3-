<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>HGZY VIP Signal Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js">
    </script>
    <style>
        /* ── RESET & BASE ── */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #0a0a12;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ── IFRAME (game) ── */
        #gameFrame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }

        /* ── FLOATING BALL LAYER ── */
        #particleLayer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 40;
            overflow: hidden;
        }

        .floating-ball {
            position: absolute;
            border-radius: 50%;
            opacity: 0;
            animation: ballFall linear forwards;
            pointer-events: none;
            will-change: transform, opacity;
        }

        @keyframes ballFall {
            0% {
                opacity: 0;
                transform: translateY(-20vh) translateX(0) scale(0.3) rotate(0deg);
            }
            10% {
                opacity: 0.9;
            }
            50% {
                transform: translateY(50vh) translateX(var(--drift, 0px)) scale(0.95) rotate(180deg);
                opacity: 0.8;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                opacity: 0;
                transform: translateY(115vh) translateX(calc(var(--drift, 0px) * 0.7)) scale(1.2) rotate(360deg);
            }
        }

        /* ── OFFLINE BANNER ── */
        #offlineBanner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(90deg, #ff0040, #ff6600, #ff0040);
            background-size: 200% 100%;
            animation: bannerPulse 1.5s infinite linear;
            color: #fff;
            text-align: center;
            padding: 7px 0;
            font-size: 12px;
            font-weight: 800;
            z-index: 10001;
            letter-spacing: 1.5px;
            display: none;
            text-transform: uppercase;
            box-shadow: 0 2px 20px rgba(255, 0, 64, 0.5);
        }
        @keyframes bannerPulse {
            0% {
                background-position: 0% 50%;
            }
            100% {
                background-position: 200% 50%;
            }
        }

        /* ── SIGNAL PANEL ── */
        .signal-panel {
            width: 175px;
            background: rgba(8, 8, 20, 0.94);
            border-radius: 22px;
            color: #fff;
            text-align: center;
            padding: 14px 10px 12px;
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            cursor: grab;
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: none;
            border: 2.5px solid transparent;
            background-clip: padding-box;
            box-shadow:
                0 0 24px rgba(0, 255, 200, 0.25),
                0 0 60px rgba(0, 255, 200, 0.08),
                inset 0 0 30px rgba(0, 255, 200, 0.04);
            animation: panelBorderRotate 5s linear infinite;
            transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                padding 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                border-radius 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                top 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                right 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                left 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            will-change: transform, width, top, right, left;
        }
        .signal-panel:active {
            cursor: grabbing;
        }

        @keyframes panelBorderRotate {
            0% {
                border-color: #00ffc8;
                box-shadow: 0 0 24px rgba(0, 255, 200, 0.3), 0 0 60px rgba(0, 255, 200, 0.08), inset 0 0 30px rgba(0, 255, 200, 0.05);
            }
            25% {
                border-color: #ff00ff;
                box-shadow: 0 0 24px rgba(255, 0, 255, 0.3), 0 0 60px rgba(255, 0, 255, 0.08), inset 0 0 30px rgba(255, 0, 255, 0.05);
            }
            50% {
                border-color: #00ccff;
                box-shadow: 0 0 24px rgba(0, 204, 255, 0.3), 0 0 60px rgba(0, 204, 255, 0.08), inset 0 0 30px rgba(0, 204, 255, 0.05);
            }
            75% {
                border-color: #ffee00;
                box-shadow: 0 0 24px rgba(255, 238, 0, 0.3), 0 0 60px rgba(255, 238, 0, 0.08), inset 0 0 30px rgba(255, 238, 0, 0.05);
            }
            100% {
                border-color: #00ffc8;
                box-shadow: 0 0 24px rgba(0, 255, 200, 0.3), 0 0 60px rgba(0, 255, 200, 0.08), inset 0 0 30px rgba(0, 255, 200, 0.05);
            }
        }

        .panel-title {
            font-size: 9px;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00ffc8, #ff00ff, #00ccff, #ffee00, #00ffc8);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleShimmer 3s linear infinite;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            line-height: 1.4;
        }
        @keyframes titleShimmer {
            0% {
                background-position: 0% 50%;
            }
            100% {
                background-position: 300% 50%;
            }
        }

        /* ── LOGIN SECTION ── */
        #loginSection {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #loginSection input {
            width: 92%;
            padding: 7px 5px;
            background: rgba(0, 0, 0, 0.75);
            border: 1.8px solid #00ffc8;
            border-radius: 12px;
            color: #fff;
            font-size: 11px;
            text-align: center;
            margin-bottom: 8px;
            outline: none;
            box-shadow: 0 0 10px rgba(0, 255, 200, 0.25);
            transition: box-shadow 0.3s, border-color 0.3s;
        }
        #loginSection input:focus {
            box-shadow: 0 0 18px rgba(0, 255, 200, 0.6);
            border-color: #00ff88;
        }
        #loginSection input::placeholder {
            color: rgba(255, 255, 255, 0.25);
            font-size: 10px;
        }

        .btn-login {
            width: 92%;
            padding: 8px;
            background: linear-gradient(135deg, #00ffc8, #00cc99);
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 900;
            cursor: pointer;
            font-size: 10px;
            text-transform: uppercase;
            margin-bottom: 7px;
            box-shadow: 0 0 16px rgba(0, 255, 200, 0.35);
            transition: transform 0.15s, box-shadow 0.15s;
            letter-spacing: 1.2px;
        }
        .btn-login:active {
            transform: scale(0.95);
            box-shadow: 0 0 28px rgba(0, 255, 200, 0.7);
        }

        .btn-telegram {
            width: 92%;
            padding: 7px 0;
            background: linear-gradient(135deg, #0088cc, #00aaee);
            color: #fff;
            text-decoration: none;
            font-size: 8px;
            font-weight: 700;
            border-radius: 12px;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            box-shadow: 0 0 12px rgba(0, 136, 204, 0.35);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn-telegram:active {
            transform: scale(0.95);
            box-shadow: 0 0 20px rgba(0, 136, 204, 0.6);
        }

        /* ── COMPACT MODE – TOP-RIGHT CORNER ── */
        .signal-panel.compact {
            width: 190px !important;
            top: 12px !important;
            right: 12px !important;
            left: auto !important;
            bottom: auto !important;
            transform: none !important;
            padding: 14px 12px 12px !important;
            border-radius: 22px !important;
            box-shadow:
                0 0 30px rgba(0, 255, 200, 0.30),
                0 0 70px rgba(0, 255, 200, 0.10),
                inset 0 0 30px rgba(0, 255, 200, 0.06) !important;
            border-width: 2.5px !important;
            animation: panelBorderRotate 5s linear infinite;
        }

        .signal-panel.compact #loginSection {
            display: none !important;
        }
        .signal-panel.compact #appSection {
            display: flex !important;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .signal-panel.compact .live-row {
            gap: 6px;
            margin-bottom: 7px;
        }
        .signal-panel.compact .wifi-icon {
            width: 18px;
            height: 18px;
        }
        .signal-panel.compact .live-badge {
            font-size: 8px;
            padding: 1px 8px;
            border-radius: 6px;
            letter-spacing: 1px;
        }

        .signal-panel.compact .period-card {
            padding: 4px 8px;
            border-radius: 10px;
            margin-bottom: 5px;
            border-width: 1.5px;
            width: 100%;
        }
        .signal-panel.compact .period-label {
            font-size: 6.5px;
            letter-spacing: 1.2px;
        }
        .signal-panel.compact .period-number {
            font-size: 16px;
            margin-top: 1px;
            letter-spacing: 2.5px;
        }

        .signal-panel.compact .timer-display {
            font-size: 22px;
            margin-bottom: 3px;
            letter-spacing: 1.5px;
        }
        .signal-panel.compact .timer-unit {
            font-size: 10px;
        }

        /* Signal rows – BIG/SMALL + COLOR */
        .signal-panel.compact .signal-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-top: 2px;
        }
        .signal-panel.compact .signal-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }
        .signal-panel.compact .signal-label {
            font-size: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 1px;
        }
        .signal-panel.compact .signal-value {
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 1px;
            min-height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .signal-panel.compact .signal-value .sig-big {
            background: linear-gradient(135deg, #00ff88, #00ffcc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 12px rgba(0, 255, 136, 0.6));
            animation: sigPulse 0.8s ease-in-out infinite alternate;
        }
        .signal-panel.compact .signal-value .sig-small {
            background: linear-gradient(135deg, #ff4466, #ff0044);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 12px rgba(255, 0, 68, 0.6));
            animation: sigPulse 0.8s ease-in-out infinite alternate;
        }

        .signal-panel.compact .signal-value .color-green {
            color: #00ff88;
            text-shadow: 0 0 14px rgba(0, 255, 136, 0.7);
        }
        .signal-panel.compact .signal-value .color-violet {
            color: #aa66ff;
            text-shadow: 0 0 14px rgba(170, 102, 255, 0.7);
        }
        .signal-panel.compact .signal-value .color-red {
            color: #ff0044;
            text-shadow: 0 0 14px rgba(255, 0, 68, 0.7);
        }

        .signal-panel.compact .signal-value .sig-analyzing {
            font-size: 9px;
            color: #ffea00;
            animation: analyzeBlink 0.4s infinite;
            text-shadow: 0 0 14px rgba(255, 234, 0, 0.6);
            letter-spacing: 1.5px;
        }

        @keyframes sigPulse {
            0% {
                transform: scale(1);
            }
            100% {
                transform: scale(1.08);
            }
        }
        @keyframes analyzeBlink {
            50% {
                opacity: 0.12;
            }
        }

        .signal-panel.compact .color-dots {
            gap: 5px;
            margin-top: 6px;
        }
        .signal-panel.compact .color-dot {
            width: 7px;
            height: 7px;
        }

        .signal-panel.compact .server-label {
            font-size: 5.5px;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        .signal-panel.compact .conn-status {
            top: 8px;
            right: 10px;
            width: 7px;
            height: 7px;
        }

        /* ── APP SECTION (hidden by default) ── */
        #appSection {
            width: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .live-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            margin-bottom: 5px;
            width: 100%;
        }
        .wifi-icon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }
        .live-badge {
            font-size: 6px;
            font-weight: 900;
            background: linear-gradient(90deg, #ff0044, #ff4400);
            color: #fff;
            padding: 1px 6px;
            border-radius: 5px;
            letter-spacing: 0.8px;
            animation: livePulse 1s ease-in-out infinite alternate;
            text-transform: uppercase;
        }
        @keyframes livePulse {
            0% {
                box-shadow: 0 0 4px rgba(255, 0, 68, 0.4);
            }
            100% {
                box-shadow: 0 0 14px rgba(255, 0, 68, 0.8);
            }
        }

        .period-card {
            width: 100%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.02));
            border: 1.5px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            padding: 3px 5px;
            margin-bottom: 4px;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.04);
        }
        .period-label {
            font-size: 5.5px;
            color: rgba(255, 255, 255, 0.35);
            text-transform: uppercase;
            letter-spacing: 1.2px;
        }
        .period-number {
            font-size: 14px;
            color: #ffee00;
            font-weight: 900;
            display: block;
            margin-top: 1px;
            text-shadow: 0 0 14px rgba(255, 238, 0, 0.5);
            letter-spacing: 2px;
        }

        .timer-display {
            font-size: 18px;
            font-weight: 900;
            margin-bottom: 2px;
            letter-spacing: 1px;
            background: linear-gradient(180deg, #00ff88, #00cc66);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 8px rgba(0, 255, 136, 0.5));
        }
        .timer-unit {
            font-size: 8px;
            font-weight: 700;
            -webkit-text-fill-color: rgba(0, 255, 136, 0.5);
        }

        .signal-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-top: 2px;
        }
        .signal-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }
        .signal-label {
            font-size: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 1px;
        }
        .signal-value {
            font-size: 16px;
            font-weight: 900;
            letter-spacing: 1px;
            min-height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .signal-value .sig-big {
            background: linear-gradient(135deg, #00ff88, #00ffcc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 12px rgba(0, 255, 136, 0.6));
            animation: sigPulse 0.8s ease-in-out infinite alternate;
        }
        .signal-value .sig-small {
            background: linear-gradient(135deg, #ff4466, #ff0044);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 12px rgba(255, 0, 68, 0.6));
            animation: sigPulse 0.8s ease-in-out infinite alternate;
        }

        .signal-value .color-green {
            color: #00ff88;
            text-shadow: 0 0 14px rgba(0, 255, 136, 0.7);
        }
        .signal-value .color-violet {
            color: #aa66ff;
            text-shadow: 0 0 14px rgba(170, 102, 255, 0.7);
        }
        .signal-value .color-red {
            color: #ff0044;
            text-shadow: 0 0 14px rgba(255, 0, 68, 0.7);
        }

        .signal-value .sig-analyzing {
            font-size: 8px;
            color: #ffea00;
            animation: analyzeBlink 0.4s infinite;
            text-shadow: 0 0 14px rgba(255, 234, 0, 0.6);
            letter-spacing: 1.5px;
        }

        .color-dots {
            display: flex;
            gap: 4px;
            margin-top: 5px;
            justify-content: center;
        }
        .color-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            animation: dotGlow 2s ease-in-out infinite alternate;
        }
        .dot-green {
            background: #00ff88;
            box-shadow: 0 0 5px #00ff88;
            animation-delay: 0s;
        }
        .dot-red {
            background: #ff0044;
            box-shadow: 0 0 5px #ff0044;
            animation-delay: 0.4s;
        }
        .dot-violet {
            background: #aa66ff;
            box-shadow: 0 0 5px #aa66ff;
            animation-delay: 0.8s;
        }
        .dot-cyan {
            background: #00ccff;
            box-shadow: 0 0 5px #00ccff;
            animation-delay: 1.2s;
        }
        .dot-yellow {
            background: #ffee00;
            box-shadow: 0 0 5px #ffee00;
            animation-delay: 1.6s;
        }
        @keyframes dotGlow {
            0% {
                transform: scale(0.6);
                opacity: 0.3;
            }
            100% {
                transform: scale(1.4);
                opacity: 1;
            }
        }

        .hidden {
            display: none !important;
        }

        .conn-status {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            position: absolute;
            top: 8px;
            right: 10px;
            transition: background 0.3s, box-shadow 0.3s;
            z-index: 5;
        }
        .conn-online {
            background: #00ff88;
            box-shadow: 0 0 8px #00ff88;
        }
        .conn-offline {
            background: #ff0044;
            box-shadow: 0 0 8px #ff0044;
            animation: analyzeBlink 0.5s infinite;
        }

        .server-label {
            font-size: 5px;
            color: rgba(255, 255, 255, 0.25);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }
        .server-label .connected {
            color: #00ff88;
        }

        /* ── DRAG HELPER ── */
        .signal-panel.dragging {
            transition: none !important;
            cursor: grabbing;
        }

        /* ── RESPONSIVE ── */
        @media (max-height: 700px) {
            .signal-panel.compact {
                width: 170px !important;
                top: 8px !important;
                right: 8px !important;
                padding: 10px 8px 8px !important;
                border-radius: 16px !important;
            }
            .signal-panel.compact .signal-value {
                font-size: 15px;
                min-height: 22px;
            }
            .signal-panel.compact .timer-display {
                font-size: 18px;
            }
            .signal-panel.compact .period-number {
                font-size: 14px;
            }
            .signal-panel.compact .color-dot {
                width: 6px;
                height: 6px;
            }
            .signal-panel.compact .live-badge {
                font-size: 6px;
                padding: 1px 5px;
            }
            .signal-panel.compact .wifi-icon {
                width: 14px;
                height: 14px;
            }
            .signal-panel.compact .period-card {
                padding: 3px 5px;
            }
        }

        @media (max-height: 580px) {
            .signal-panel.compact {
                width: 145px !important;
                top: 4px !important;
                right: 4px !important;
                padding: 8px 6px 6px !important;
                border-radius: 14px !important;
            }
            .signal-panel.compact .signal-value {
                font-size: 12px;
                min-height: 18px;
            }
            .signal-panel.compact .timer-display {
                font-size: 14px;
            }
            .signal-panel.compact .period-number {
                font-size: 11px;
            }
            .signal-panel.compact .color-dot {
                width: 5px;
                height: 5px;
            }
            .signal-panel.compact .live-badge {
                font-size: 5px;
                padding: 0 4px;
            }
            .signal-panel.compact .wifi-icon {
                width: 12px;
                height: 12px;
            }
            .signal-panel.compact .period-card {
                padding: 2px 4px;
            }
            .signal-panel.compact .server-label {
                font-size: 4.5px;
            }
            .signal-panel.compact .signal-row {
                gap: 6px;
            }
        }

        @media (max-width: 480px) {
            .signal-panel.compact {
                width: 165px !important;
                top: 8px !important;
                right: 8px !important;
            }
        }
    </style>
</head>
<body>

    <!-- GAME IFRAME -->
    <iframe id="gameFrame" src="https://hgnice.cc/#/register?invitationCode=511711502736"></iframe>

    <!-- FLOATING BALL LAYER -->
    <div id="particleLayer"></div>

    <!-- OFFLINE BANNER -->
    <div id="offlineBanner">⚠️ NO INTERNET — SIGNAL PANEL DISABLED</div>

    <!-- SIGNAL PANEL -->
    <div class="signal-panel" id="dragPanel">
        <div class="conn-status conn-online" id="connDot"></div>

        <!-- LOGIN SECTION -->
        <div id="loginSection">
            <div class="panel-title">HGZY VIP<br />Signal Panel</div>
            <input type="password" id="passInput" placeholder="Enter Password" />
            <button class="btn-login" id="loginBtn">Login</button>
            <a href="https://hgnice.cc/#/register?invitationCode=511711502736" target="_blank" class="btn-telegram">Telegram</a>
        </div>

        <!-- SIGNAL SECTION -->
        <div id="appSection">
            <div class="live-row">
                <svg class="wifi-icon" viewBox="0 0 24 24" fill="none">
                    <path d="M12 18a1.5 1.5 0 110 3 1.5 1.5 0 010-3z" fill="#00ff88" />
                    <path d="M8.46 15.54a5 5 0 017.08 0" stroke="#00ff88" stroke-width="2" stroke-linecap="round" />
                    <path d="M5.05 12.13a9 9 0 0113.9 0" stroke="#00ff88" stroke-width="2" stroke-linecap="round" />
                    <path d="M1.64 8.72a13 13 0 0120.72 0" stroke="#00ff88" stroke-width="2" stroke-linecap="round" />
                </svg>
                <span class="live-badge">LIVE</span>
            </div>

            <div class="period-card">
                <span class="period-label">Period</span>
                <span class="period-number" id="periodID">----</span>
            </div>

            <div class="timer-display">
                <span id="timer">--</span><span class="timer-unit">s</span>
            </div>

            <!-- Signal Row: BIG/SMALL + COLOR -->
            <div class="signal-row">
                <div class="signal-item">
                    <span class="signal-label">BIG / SMALL</span>
                    <span class="signal-value" id="prediction">--</span>
                </div>
                <div class="signal-item">
                    <span class="signal-label">Color</span>
                    <span class="signal-value" id="colorPrediction">--</span>
                </div>
            </div>

            <div class="color-dots">
                <div class="color-dot dot-green"></div>
                <div class="color-dot dot-red"></div>
                <div class="color-dot dot-violet"></div>
                <div class="color-dot dot-cyan"></div>
                <div class="color-dot dot-yellow"></div>
            </div>

            <div class="server-label"><span class="connected">●</span> Server Connected</div>
        </div>
    </div>

    <script>
        /* ──────────────────────────────────────────────
           FIREBASE CONFIG
           ────────────────────────────────────────────── */
        const firebaseConfig = {
            apiKey: "AIzaSyA4MXyCyvpAL8NQ23j3TWxiszPofWInVA",
            authDomain: "wingo-ai-624fb.firebaseapp.com",
            databaseURL: "https://wingo-ai-624fb-default-rtdb.firebaseio.com",
            projectId: "wingo-ai-624fb",
            appId: "1:266167882150:web:7f0f83606dfd4bcd8aff67"
        };
        firebase.initializeApp(firebaseConfig);
        const dbRef = firebase.database().ref();

        /* ──────────────────────────────────────────────
           STATE
           ────────────────────────────────────────────── */
        let lastPeriod = null;
        let isRunning = false;
        let isOnline = navigator.onLine;
        let fetchInterval = null;
        let loopInterval = null;
        let particleInterval = null;

        /* ──────────────────────────────────────────────
           DOM REFS
           ────────────────────────────────────────────── */
        const panel = document.getElementById("dragPanel");
        const loginSection = document.getElementById("loginSection");
        const appSection = document.getElementById("appSection");
        const passInput = document.getElementById("passInput");
        const loginBtn = document.getElementById("loginBtn");
        const periodEl = document.getElementById("periodID");
        const timerEl = document.getElementById("timer");
        const predictionEl = document.getElementById("prediction");
        const colorPredictionEl = document.getElementById("colorPrediction");
        const offlineBanner = document.getElementById("offlineBanner");
        const connDot = document.getElementById("connDot");
        const particleLayer = document.getElementById("particleLayer");

        /* ──────────────────────────────────────────────
           DRAG STATE – persistent via localStorage
           ────────────────────────────────────────────── */
        let dragOffsetX = 0;
        let dragOffsetY = 0;
        let isDragging = false;
        let dragStartMouseX = 0;
        let dragStartMouseY = 0;
        let dragStartTop = 0;
        let dragStartRight = 0;

        let panelTop = 12;
        let panelRight = 12;

        /* ──────────────────────────────────────────────
           PERSISTENT POSITION
           ────────────────────────────────────────────── */
        function loadPosition() {
            try {
                const saved = localStorage.getItem('hgzyPanelPos');
                if (saved) {
                    const pos = JSON.parse(saved);
                    if (pos.top !== undefined) {
                        panelTop = pos.top;
                        panelRight = pos.right;
                    } else {
                        dragOffsetX = pos.x || 0;
                        dragOffsetY = pos.y || 0;
                    }
                    applyPosition();
                }
            } catch (_) { /* ignore */ }
        }

        function savePosition() {
            try {
                if (panel.classList.contains('compact')) {
                    localStorage.setItem('hgzyPanelPos', JSON.stringify({
                        top: panelTop,
                        right: panelRight
                    }));
                } else {
                    localStorage.setItem('hgzyPanelPos', JSON.stringify({
                        x: dragOffsetX,
                        y: dragOffsetY
                    }));
                }
            } catch (_) { /* ignore */ }
        }

        function applyPosition() {
            if (panel.classList.contains('compact')) {
                panel.style.top = panelTop + 'px';
                panel.style.right = panelRight + 'px';
                panel.style.left = 'auto';
                panel.style.transform = 'none';
            } else {
                panel.style.transform = 'translate(calc(-50% + ' + dragOffsetX + 'px), ' + dragOffsetY + 'px)';
                panel.style.top = '80px';
                panel.style.left = '50%';
                panel.style.right = 'auto';
            }
        }

        /* ──────────────────────────────────────────────
           ONLINE / OFFLINE
           ────────────────────────────────────────────── */
        function updateConnectionStatus() {
            isOnline = navigator.onLine;
            if (!isOnline) {
                offlineBanner.style.display = 'block';
                panel.classList.add('hidden');
                connDot.className = 'conn-status conn-offline';
                stopIntervals();
            } else {
                offlineBanner.style.display = 'none';
                panel.classList.remove('hidden');
                if (isRunning) startIntervals();
                connDot.className = 'conn-status conn-online';
                requestAnimationFrame(applyPosition);
            }
        }

        window.addEventListener('online', updateConnectionStatus);
        window.addEventListener('offline', updateConnectionStatus);
        updateConnectionStatus();

        /* ──────────────────────────────────────────────
           INTERVALS
           ────────────────────────────────────────────── */
        function startIntervals() {
            stopIntervals();
            loopInterval = setInterval(mainLoop, 1000);
            fetchInterval = setInterval(fetchPeriodData, 2500);
            particleInterval = setInterval(spawnBall, 400);
        }

        function stopIntervals() {
            if (loopInterval) { clearInterval(loopInterval);
                loopInterval = null; }
            if (fetchInterval) { clearInterval(fetchInterval);
                fetchInterval = null; }
            if (particleInterval) { clearInterval(particleInterval);
                particleInterval = null; }
        }

        /* ──────────────────────────────────────────────
           LOGIN
           ────────────────────────────────────────────── */
        function handleLogin() {
            if (passInput.value.trim() === 'VIP100') {
                loginSection.style.display = 'none';
                appSection.style.display = 'flex';
                panel.classList.add('compact');
                panelTop = 12;
                panelRight = 12;
                applyPosition();
                isRunning = true;
                if (isOnline) startIntervals();
                fetchPeriodData();
                mainLoop();
                savePosition();
            } else {
                alert('Wrong Password!');
            }
        }

        loginBtn.addEventListener('click', handleLogin);
        passInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') handleLogin();
        });

        /* ──────────────────────────────────────────────
           FETCH PERIOD
           ────────────────────────────────────────────── */
        async function fetchPeriodData() {
            if (!isOnline) return;
            try {
                const response = await fetch(
                    'https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json?r=' + Date.now()
                );
                const json = await response.json();
                if (json.data && json.data.list && json.data.list.length > 0) {
                    lastPeriod = (BigInt(json.data.list[0].issueNumber) + 1n).toString();
                }
            } catch (_) { /* ignore */ }
        }

        /* ──────────────────────────────────────────────
           SIGNAL ANALYSIS – BIG/SMALL + COLOR
           ────────────────────────────────────────────── */
        function analyzeSignal(period) {
            let hash = 0;
            const seed = period + 'HGZY_VIP_SIGNAL_2026';
            for (let i = 0; i < seed.length; i++) {
                hash = ((hash << 13) - hash) + seed.charCodeAt(i);
                hash = (hash << 5) | (hash >>> 27);
            }

            // BIG / SMALL
            const val = Math.abs(Math.sin(hash + 0.618033988749895));
            const val2 = Math.abs(Math.cos(hash * 0.7071067811865475));
            const combined = (val * 0.6 + val2 * 0.4);
            const isBig = combined > 0.48;

            // COLOR: GREEN, VIOLET, RED
            const colorHash = Math.abs(Math.sin(hash * 1.618033988749895 + 0.5772156649));
            let color;
            if (colorHash < 0.33) color = 'GREEN';
            else if (colorHash < 0.66) color = 'VIOLET';
            else color = 'RED';

            return { isBig, color };
        }

        /* ──────────────────────────────────────────────
           MAIN LOOP
           ────────────────────────────────────────────── */
        function mainLoop() {
            if (!isRunning || !isOnline) return;
            const now = new Date();
            const seconds = now.getSeconds();
            periodEl.innerText = lastPeriod ? lastPeriod.slice(-4) : '----';

            let remaining = seconds < 30 ? (30 - seconds) : (60 - seconds);
            timerEl.innerText = remaining < 10 ? '0' + remaining : remaining;

            const isAnalyzing = (remaining <= 5 || remaining === 30 || remaining === 0);

            if (isAnalyzing) {
                predictionEl.innerHTML = '<span class="sig-analyzing">⏳</span>';
                colorPredictionEl.innerHTML = '<span class="sig-analyzing">⏳</span>';
            } else {
                const result = analyzeSignal(lastPeriod || '0');

                // BIG / SMALL
                const bigSmallText = result.isBig ? 'BIG' : 'SMALL';
                const bsClass = result.isBig ? 'sig-big' : 'sig-small';
                const bsEmoji = result.isBig ? '' : '';
                predictionEl.innerHTML = '<span class="' + bsClass + '">' + bsEmoji + ' ' + bigSmallText + '</span>';

                // COLOR
                const colorText = result.color;
                const colorClass = 'color-' + colorText.toLowerCase();
                const colorEmoji = colorText === 'GREEN' ? '🟢' : (colorText === 'VIOLET' ? '🟣' : '🔴');
                colorPredictionEl.innerHTML = '<span class="' + colorClass + '">' + colorEmoji + ' ' + colorText +
                '</span>';
            }
        }

        /* ──────────────────────────────────────────────
           FLOATING BALLS
           ────────────────────────────────────────────── */
        const ballColors = [
            { bg: 'radial-gradient(circle at 35% 35%, #00ff88, #009955)', shadow: '#00ff88' },
            { bg: 'radial-gradient(circle at 35% 35%, #ff0066, #990033)', shadow: '#ff0066' },
            { bg: 'radial-gradient(circle at 35% 35%, #aa66ff, #663399)', shadow: '#aa66ff' },
            { bg: 'radial-gradient(circle at 35% 35%, #00ccff, #007799)', shadow: '#00ccff' },
            { bg: 'radial-gradient(circle at 35% 35%, #ffee00, #998800)', shadow: '#ffee00' },
            { bg: 'radial-gradient(circle at 35% 35%, #ff8800, #994400)', shadow: '#ff8800' },
            { bg: 'radial-gradient(circle at 35% 35%, #ff00ff, #990099)', shadow: '#ff00ff' },
            { bg: 'radial-gradient(circle at 35% 35%, #33ffcc, #009977)', shadow: '#33ffcc' },
            { bg: 'radial-gradient(circle at 35% 35%, #ffcc00, #997700)', shadow: '#ffcc00' },
        ];

        function spawnBall() {
            if (!isOnline) return;
            const ball = document.createElement('div');
            ball.className = 'floating-ball';

            const size = Math.floor(Math.random() * 14) + 6;
            ball.style.width = size + 'px';
            ball.style.height = size + 'px';

            ball.style.left = (Math.random() * 96 + 2) + '%';
            ball.style.top = '-30px';

            const colorSet = ballColors[Math.floor(Math.random() * ballColors.length)];
            ball.style.background = colorSet.bg;
            ball.style.boxShadow = '0 0 ' + (size * 0.9) + 'px ' + colorSet.shadow + ', inset 0 0 ' + (size * 0.3) +
                'px rgba(255,255,255,0.12)';

            const duration = (Math.random() * 6) + 4.5;
            ball.style.animationDuration = duration + 's';

            const drift = (Math.random() - 0.5) * 110;
            ball.style.setProperty('--drift', drift + 'px');

            particleLayer.appendChild(ball);

            setTimeout(function() {
                if (ball.parentNode) ball.parentNode.removeChild(ball);
            }, duration * 1000 + 200);
        }

        /* ──────────────────────────────────────────────
           DRAG SYSTEM
           ────────────────────────────────────────────── */
        function onDragStart(e) {
            const tag = e.target.tagName;
            if (tag === 'INPUT' || tag === 'BUTTON' || tag === 'A') return;
            if (e.button !== undefined && e.button !== 0) return;

            isDragging = true;
            const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
            const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;

            dragStartMouseX = clientX;
            dragStartMouseY = clientY;

            if (panel.classList.contains('compact')) {
                dragStartTop = panelTop;
                dragStartRight = panelRight;
            } else {
                dragStartOffsetX = dragOffsetX;
                dragStartOffsetY = dragOffsetY;
            }

            panel.classList.add('dragging');
            e.preventDefault();
        }

        function onDragMove(e) {
            if (!isDragging) return;
            e.preventDefault();

            const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
            const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;

            const deltaX = clientX - dragStartMouseX;
            const deltaY = clientY - dragStartMouseY;

            if (panel.classList.contains('compact')) {
                panelTop = Math.max(2, dragStartTop + deltaY);
                panelRight = Math.max(2, dragStartRight - deltaX);
                applyPosition();
            } else {
                dragOffsetX = dragStartOffsetX + deltaX;
                dragOffsetY = dragStartOffsetY + deltaY;
                applyPosition();
            }
            savePosition();
        }

        function onDragEnd(e) {
            if (isDragging) {
                isDragging = false;
                panel.classList.remove('dragging');
                applyPosition();
                savePosition();
            }
        }

        panel.addEventListener('mousedown', onDragStart);
        window.addEventListener('mousemove', onDragMove);
        window.addEventListener('mouseup', onDragEnd);

        panel.addEventListener('touchstart', onDragStart, { passive: false });
        window.addEventListener('touchmove', onDragMove, { passive: false });
        window.addEventListener('touchend', onDragEnd, { passive: false });
        window.addEventListener('touchcancel', onDragEnd, { passive: false });

        /* ──────────────────────────────────────────────
           INIT
           ────────────────────────────────────────────── */
        loadPosition();

        if (!isOnline) {
            panel.classList.add('hidden');
            offlineBanner.style.display = 'block';
        }

        for (let i = 0; i < 6; i++) {
            setTimeout(spawnBall, i * 300);
        }

        console.log('🚀 HGZY VIP Signal Panel Ready');
        console.log('📡 Internet:', isOnline ? 'ONLINE' : 'OFFLINE');
        console.log('🔑 Password: 123456');
        console.log('📍 Panel at top-right corner, drag to reposition');
    </script>
</body>
</html>
