    </style>
</head>

        function onDragStart(e) {
            if (['INPUT','BUTTON','A'].includes(e.target.tagName)) return;
            isDragging = true;
            const cx = e.type.startsWith('touch') ? e.touches[0].clientX : e.clientX;
            const cy = e.type.startsWith('touch') ? e.touches[0].clientY : e.clientY;
            startX = cx; startY = cy; startTop = panelTop; startRight = panelRight;
            panel.classList.add('dragging');
        }
        function onDragMove(e) {
            if (!isDragging) return;
            e.preventDefault();
            const cx = e.type.startsWith('touch') ? e.touches[0].clientX : e.clientX;
            const cy = e.type.startsWith('touch') ? e.touches[0].clientY : e.clientY;
            panelTop = Math.max(5, startTop + (cy - startY));
            panelRight = Math.max(5, startRight - (cx - startX));
            applyPosition();
        }
        function onDragEnd() { isDragging = false; panel.classList.remove('dragging'); }

                hash |= 0;
            }
            let combined = Math.abs(Math.sin(hash * 9301 + 49297) % 1);
            let luckyNum = Math.abs(hash) % 10;
            let isBig = luckyNum >= 5;
            let numColor = getNumberColor(luckyNum);

            let boxClass = 'cb-analyzing';
            let colorText = 'ANALYZING...';
            if (numColor.name === 'GREEN') { boxClass = 'cb-green'; colorText = 'GREEN'; }
            else if (numColor.name === 'RED') { boxClass = 'cb-red'; colorText = 'RED'; }
            else if (numColor.name === 'RED+VIOLET') { boxClass = 'cb-red-violet'; colorText = 'RED+VIOLET'; }
            else if (numColor.name === 'GREEN+VIOLET') { boxClass = 'cb-green-violet'; colorText = 'GREEN+VIOLET'; }

            return { isBig, luckyNum, numColor, boxClass, colorText };
        }

        function highlightChip(num) {
            allChips.forEach(c => c.classList.remove('active'));
            const target = document.querySelector(`.num-chip[data-n="${num}"]`);
            if (target) target.classList.add('active');
        }

        function runtimeClock() {
            if (!isRunning || !isOnline) return;

            let now = new Date();
            let seconds = now.getSeconds();
            let millis = now.getMilliseconds();
            let totalRemaining;

            if (seconds < 30) {
                totalRemaining = (30 - seconds) - (millis / 1000);
            } else {
                totalRemaining = (60 - seconds) - (millis / 1000);
            }

            let remaining = Math.max(0, totalRemaining);
            let displaySec = Math.ceil(remaining);
            if (displaySec > 30) displaySec = 30;

            if (!lastPeriod) lastPeriod = Math.floor(Date.now() / 30000).toString();
            periodEl.innerText = lastPeriod.slice(-5);

            timerEl.innerText = displaySec < 10 ? '0' + displaySec : displaySec;

            let pct = (remaining / 30) * 100;
            timerBar.style.width = pct + '%';
            if (remaining <= 5) {
                timerBar.style.background = '#ff0044';
                timerEl.style.color = '#ff0044';
                timerEl.style.textShadow = '0 0 14px rgba(255,0,68,0.5)';
            } else if (remaining <= 10) {
                timerBar.style.background = '#ffee00';
                timerEl.style.color = '#ffee00';
                timerEl.style.textShadow = '0 0 14px rgba(255,238,0,0.45)';
            } else {
                timerBar.style.background = '#00ffc8';
                timerEl.style.color = '#00ff88';
                timerEl.style.textShadow = '0 0 14px rgba(0,255,136,0.45)';
            }

            if (remaining <= 5) {
                predictionEl.innerHTML = '<span class="sig-analyzing">⏳ SCAN</span>';
                numberEl.innerHTML = '<span class="sig-analyzing">⏳</span>';
                colorPredictionEl.innerText = 'SCANNING...';
                colorBox.className = 'color-box cb-analyzing';
                allChips.forEach(c => c.classList.remove('active'));
                cachedSignal = null;
                lastSignalKey = null;
            } else {
                if (!cachedSignal) {
                    cachedSignal = processPredictor(lastPeriod);
                    highlightChip(cachedSignal.luckyNum);
                    lastSignalKey = lastPeriod;
                }
                let s = cachedSignal;
                let signalKey = s.isBig ? 'BIG' : 'SMALL';

                /* সিগন্যাল আপডেট হলে ফ্ল্যাশ অ্যানিমেশন */
                if (predictionEl.dataset.lastSig !== signalKey) {
                    predictionEl.dataset.lastSig = signalKey;
                    let cls = s.isBig ? 'sig-big' : 'sig-small';
                    predictionEl.innerHTML = `<span class="${cls} sig-flash">${signalKey}</span>`;
                    numberEl.innerHTML = `<span class="sig-flash" style="color:#fff;font-size:28px;font-weight:950">${s.luckyNum}</span>`;
                }

                colorPredictionEl.innerText = s.colorText;
                colorBox.className = 'color-box ' + s.boxClass;
            }
        }

        const particleColors = [
            'radial-gradient(circle at 30% 30%, #00ffc8, #005544)',
            'radial-gradient(circle at 30% 30%, #ff00ff, #550055)',
            'radial-gradient(circle at 30% 30%, #ffee00, #554400)',
            'radial-gradient(circle at 30% 30%, #00ccff, #004455)',
            'radial-gradient(circle at 30% 30%, #ff4466, #550022)',
        ];
        setInterval(() => {
            if (!isOnline) return;
            const ball = document.createElement('div');
            ball.className = 'floating-ball';
            let size = Math.random() * 9 + 4;
            ball.style.width = size + 'px';
            ball.style.height = size + 'px';
            ball.style.left = Math.random() * 95 + '%';
            ball.style.top = '-20px';
            ball.style.setProperty('--drift', (Math.random() * 80 - 40) + 'px');
            ball.style.background = particleColors[Math.floor(Math.random() * particleColors.length)];
            ball.style.animationDuration = (Math.random() * 5 + 4) + 's';
            particleLayer.appendChild(ball);
            setTimeout(() => ball.remove(), 9000);
        }, 400);
    </script>
</body>
</html>
